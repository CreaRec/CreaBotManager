# Drop-in for faster stop/restart. Default systemd TimeoutStopSec is often 90s.
# Deploy applies this via `systemctl set-property TimeoutStopSec=…` (see scripts/configure-managed-bot-timeouts.sh).
# Manual install target:
#   /etc/systemd/system/<unit>.service.d/crea-timeout.conf
[Service]
TimeoutStopSec=10
